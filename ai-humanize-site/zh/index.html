<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
    <title>AI 人性化 · 免费AI文本改写</title>
    <link href="https://fonts.googleapis.com/css?family=Nunito+Sans:400,600,700,800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="../style.css"/>
</head>
<body>
<div id="meteor-container"></div>
<nav class="navbar-custom">
    <div class="brand" id="brandLogo">✦ AI 人性化</div>
    <div class="nav-links">
        <a href="#tool">工具</a>
        <a href="#" id="historyLink">历史</a>
        <span class="usage-badge">
            <span class="badge-dot"></span>
            <span>永久免费</span>
        </span>
        <div class="lang-switch">
            <a href="../" title="English">English</a>
            <a class="curr" href="./" title="简体中文">简体中文</a>
        </div>
    </div>
</nav>
<div class="container" style="margin-top:20px;">
    <div class="main-title">
        ✦ AI 人性化 · 让AI文本更像人写的
        <span class="sub">将AI生成的内容转化为自然流畅的人类语言</span>
    </div>
    <div class="welcome-banner">
        <div class="greeting">👋 欢迎，<span style="color:#c084fc;">创作者</span> ✨</div>
        <div class="daily-tip" id="dailyTip">💡 完全免费 · 无需注册 · 真实AI改写</div>
    </div>
    <div id="tool" class="card-glass">
        <h2 style="color:#f0ecff;">🎯 AI 文本人性化</h2>
        <div style="display:flex; gap:12px; flex-wrap:wrap; margin-bottom:20px;">
            <button class="btn-primary-glow" id="pasteBtn">📋 粘贴文本</button>
            <button class="btn-primary-glow" id="sampleBtn">📄 试用示例</button>
            <button class="btn-secondary" id="clearBtn">🗑️ 清空</button>
        </div>
        <div class="editable-div" contenteditable="true" id="inputText" placeholder="在此粘贴或输入AI生成的文本..."></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px;">
            <span style="color:#b4a6d4;">字数：<span id="wordCount">0</span></span>
            <button class="btn-primary-glow" id="humanizeBtn">✨ 人性化改写</button>
        </div>
        <div style="margin-top:30px;">
            <h4 style="color:#c4b5fd;">📝 改写结果</h4>
            <div class="output-view" id="outputArea">
                <span style="color:#8a7aaa;">等待改写...</span>
                <span class="blinking-cursor"></span>
            </div>
            <div style="display:flex; gap:12px; margin-top:12px; flex-wrap:wrap;">
                <button class="btn-primary-glow" id="copyOutputBtn">📋 复制结果</button>
                <button class="btn-secondary" id="regenerateBtn">🔄 重新生成</button>
            </div>
        </div>
        <div class="status-bar" id="statusBar" style="display:none;">
            <div>AI 检测分数：<span class="score" id="aiScore">--</span></div>
            <div style="margin-top:8px;">
                <span id="statusText" style="color:#c4b5fd;">等待检测...</span>
            </div>
        </div>
    </div>
    <div id="historyPanel" class="card-glass" style="display:none;">
        <h4 style="color:#c084fc;">📂 历史记录</h4>
        <div id="historyList"><p style="color:#8a7aaa;">暂无记录</p></div>
    </div>
    <div style="display:flex; gap:20px; margin:20px 0; justify-content:center;">
        <button class="btn-primary-glow" id="likeBtn">👍 有用</button>
        <button class="btn-primary-glow" id="dislikeBtn">👎 需改进</button>
    </div>
</div>
<button class="floating-tip" id="inspireBtn">
    <span style="font-size:22px;">💡</span> 写作灵感
</button>
<footer style="background:#0b0818; border-top:1px solid #3d2a5c; padding:30px 0; margin-top:50px; text-align:center; color:#8a7aaa;">
    <p>© 2025 AI 人性化 · 免费 · 无需注册 · 真实AI改写</p>
</footer>
<script src="../script.js"></script>
</body>
</html>
